{% extends "base.html" %}
{% block title %}Contact - QuickRent{% endblock %}
{% block head %}{% endblock %}

{% block body %}
<main class="bg-gray-50 min-h-screen pt-24 pb-16">
  <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Contact Us</h1>
      <p class="text-sm text-gray-500 mb-6">Send a message to our support team.</p>

      <form method="POST" action="{{ url_for('public.contact') }}" class="space-y-4">
        {% if subject %}
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Subject</label>
          <input name="subject" value="{{ subject }}" readonly
            class="w-full border border-gray-300 px-4 py-2.5 rounded-lg text-sm bg-gray-50 text-gray-700 focus:outline-none">
        </div>
        {% endif %}
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Name</label>
          <input name="name" required
            class="w-full border border-gray-300 px-4 py-2.5 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
          <input name="email" type="email" required
            class="w-full border border-gray-300 px-4 py-2.5 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Message</label>
          <textarea name="message" rows="5" required
            class="w-full border border-gray-300 px-4 py-2.5 rounded-lg text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 resize-none"></textarea>
        </div>

        <button type="submit"
          class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors">
          Submit
        </button>
      </form>
    </div>
  </div>
</main>
{% endblock %}
